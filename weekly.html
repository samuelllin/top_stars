---
layout: default
title: Weekly Star Growth - Top GitHub Repos
permalink: /weekly
---

<style>
  .weekly-header {
    margin-bottom: 24px;
  }
  .weekly-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 8px 0;
  }
  .weekly-header p {
    color: #555;
    margin: 0;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: #0969da;
    text-decoration: none;
    font-size: 14px;
  }
  .back-link:hover { text-decoration: underline; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .day-card {
    border: 1px solid #d0d7de;
    border-radius: 8px;
    padding: 16px 18px;
    cursor: pointer;
    background: #fff;
    transition: box-shadow 0.15s, border-color 0.15s;
    user-select: none;
  }
  .day-card:hover {
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    border-color: #0969da;
  }
  .day-card .date-text {
    font-size: 16px;
    font-weight: 600;
    color: #24292f;
  }
  .day-card .prev-text {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }
  .day-card .repo-count {
    margin-top: 8px;
    font-size: 12px;
    color: #0969da;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 10px;
    width: 100%;
    max-width: 820px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #d0d7de;
    flex-shrink: 0;
  }
  .modal-header h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    color: #24292f;
  }
  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: #666;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .modal-close:hover { background: #f0f0f0; color: #333; }
  .modal-body {
    overflow-y: auto;
    padding: 0;
    flex: 1;
  }
  .repo-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .repo-table thead th {
    position: sticky;
    top: 0;
    background: #f6f8fa;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    color: #444;
    border-bottom: 1px solid #d0d7de;
    white-space: nowrap;
  }
  .repo-table tbody tr {
    border-bottom: 1px solid #eaeef2;
    transition: background 0.1s;
  }
  .repo-table tbody tr:hover { background: #f6f8fa; }
  .repo-table tbody td {
    padding: 9px 14px;
    vertical-align: top;
  }
  .rank-cell {
    color: #888;
    font-size: 12px;
    width: 32px;
    text-align: center;
  }
  .gained-cell {
    font-weight: 700;
    color: #1a7f37;
    white-space: nowrap;
  }
  .gained-cell.negative { color: #cf222e; }
  .repo-name a {
    font-weight: 600;
    color: #0969da;
    text-decoration: none;
  }
  .repo-name a:hover { text-decoration: underline; }
  .repo-desc {
    color: #555;
    font-size: 12px;
    margin-top: 2px;
    max-width: 340px;
  }
  .lang-badge {
    display: inline-block;
    background: #eef2f7;
    color: #444;
    border-radius: 12px;
    padding: 1px 8px;
    font-size: 11px;
    white-space: nowrap;
  }
  .stars-cell {
    white-space: nowrap;
    color: #666;
  }
  .loading-msg, .error-msg {
    padding: 40px 20px;
    text-align: center;
    color: #888;
  }
  .error-msg { color: #cf222e; }
</style>

<a href="/" class="back-link">← 返回首页</a>

<div class="weekly-header">
  <h2>📈 每周新增 Stars 排行</h2>
  <p>点击任意日期，查看该日与上次记录相比新增 Stars 最多的项目。</p>
</div>

<div id="days-container">
  <p class="loading-msg">正在加载数据…</p>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">—</h3>
      <button class="modal-close" id="modal-close-btn" title="关闭">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
    </div>
  </div>
</div>

<script>
(function () {
  var weeklyData = null;

  function fetchData() {
    fetch('/weekly_stars.json')
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        weeklyData = data.days;
        renderDays(weeklyData);
      })
      .catch(function (err) {
        document.getElementById('days-container').innerHTML =
          '<p class="error-msg">数据加载失败：' + err.message + '。请确认 weekly_stars.json 已生成并部署。</p>';
      });
  }

  function renderDays(days) {
    if (!days || days.length === 0) {
      document.getElementById('days-container').innerHTML = '<p class="loading-msg">暂无数据。</p>';
      return;
    }
    var html = '<div class="days-grid">';
    for (var i = 0; i < days.length; i++) {
      var d = days[i];
      var prevText = d.prev_day ? '对比 ' + d.prev_day : '首次记录';
      var repoCount = d.top_repos ? d.top_repos.length : 0;
      html += '<div class="day-card" data-index="' + i + '" onclick="showDay(' + i + ')">'
        + '<div class="date-text">📅 ' + d.day + '</div>'
        + '<div class="prev-text">' + prevText + '</div>'
        + '<div class="repo-count">查看 Top ' + repoCount + ' 项目 →</div>'
        + '</div>';
    }
    html += '</div>';
    document.getElementById('days-container').innerHTML = html;
  }

  window.showDay = function (index) {
    var d = weeklyData[index];
    var title = '📅 ' + d.day + ' 新增 Stars 排行';
    if (d.prev_day) {
      title += '（对比 ' + d.prev_day + '）';
    } else {
      title += '（首次记录，按总 Stars 排序）';
    }
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = buildRepoTable(d.top_repos, !!d.prev_day);
    document.getElementById('modal-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  };

  function buildRepoTable(repos, hasPrev) {
    if (!repos || repos.length === 0) return '<p class="loading-msg">无数据</p>';
    var html = '<table class="repo-table"><thead><tr>'
      + '<th>#</th>'
      + (hasPrev ? '<th>新增 ⭐</th>' : '<th>总 Stars ⭐</th>')
      + '<th>项目</th>'
      + '<th>语言</th>'
      + '<th>当前 Stars</th>'
      + '</tr></thead><tbody>';
    for (var i = 0; i < repos.length; i++) {
      var r = repos[i];
      var gained = hasPrev ? r.stars_gained : r.stars;
      var gainedClass = gained < 0 ? 'gained-cell negative' : 'gained-cell';
      var gainedText = gained >= 0 ? '+' + gained : '' + gained;
      var nameCell = r.html_url
        ? '<a href="' + r.html_url + '" target="_blank" rel="noopener">' + escapeHtml(r.full_name) + '</a>'
        : escapeHtml(r.full_name);
      var desc = r.description ? '<div class="repo-desc">' + escapeHtml(r.description) + '</div>' : '';
      var lang = r.language ? '<span class="lang-badge">' + escapeHtml(r.language) + '</span>' : '—';
      html += '<tr>'
        + '<td class="rank-cell">' + (i + 1) + '</td>'
        + '<td class="' + gainedClass + '">' + gainedText + '</td>'
        + '<td class="repo-name">' + nameCell + desc + '</td>'
        + '<td>' + lang + '</td>'
        + '<td class="stars-cell">⭐ ' + r.stars.toLocaleString() + '</td>'
        + '</tr>';
    }
    html += '</tbody></table>';
    return html;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  document.getElementById('modal-close-btn').addEventListener('click', function () {
    closeModal();
  });
  document.getElementById('modal-overlay').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeModal();
  });

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  fetchData();
})();
</script>
